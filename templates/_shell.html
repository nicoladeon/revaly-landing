<link rel="preload" as="font" type="font/woff2" href="/fonts/geist-var.woff2" crossorigin />
<style>
  @font-face {
    font-family: Fraunces;
    src: url("/fonts/fraunces-var.woff2") format("woff2");
    font-weight: 300 700; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: Geist;
    src: url("/fonts/geist-var.woff2") format("woff2");
    font-weight: 100 900; font-style: normal; font-display: swap;
  }
  /* ── Tokens (DA Revaly : iris unique + porcelaine froide, light par défaut) ── */
  :root {
    --bg: #F4F5F8;
    --bg-soft: #ECEEF3;
    --raised: #FFFFFF;
    --ink: #171A21;
    --muted: #5A6072;
    --subtle: #8B91A3;
    --line: rgba(23, 26, 33, 0.10);
    --line-strong: rgba(23, 26, 33, 0.18);
    --iris: #6366F1;
    --iris-deep: #4F46E5;
    --iris-soft: #EEF0FE;
    --iris-glow: rgba(99, 102, 241, 0.32);
    --success: #12B76A;
    --night-1: #12151C;
    --night-2: #1A1E28;
    --night-3: #090B0F;
    --on-night: #F2F3F7;
    --on-night-muted: rgba(242, 243, 247, 0.66);
    --shadow-sm: 0 1px 2px rgba(23, 26, 33, 0.05), 0 2px 8px rgba(23, 26, 33, 0.05);
    --shadow-md: 0 2px 6px rgba(23, 26, 33, 0.06), 0 10px 28px rgba(23, 26, 33, 0.08);
    --shadow-xl: 0 8px 24px rgba(9, 11, 15, 0.18), 0 28px 64px rgba(9, 11, 15, 0.22);
    --font-display: Fraunces, "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --font-sans: Geist, "Geist Sans", -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0B0D12; --bg-soft: #10131A; --raised: #141822; --ink: #F2F3F7;
      --muted: #A6ACBD; --subtle: #737A8C;
      --line: rgba(242, 243, 247, 0.10); --line-strong: rgba(242, 243, 247, 0.20);
      --iris: #818CF8; --iris-deep: #6366F1; --iris-soft: rgba(99, 102, 241, 0.16);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.35);
      --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.45), 0 10px 28px rgba(0, 0, 0, 0.4);
      --shadow-xl: 0 8px 24px rgba(0, 0, 0, 0.5), 0 28px 64px rgba(0, 0, 0, 0.55);
    }
  }
  :root[data-theme="light"] {
    --bg: #F4F5F8; --bg-soft: #ECEEF3; --raised: #FFFFFF; --ink: #171A21;
    --muted: #5A6072; --subtle: #8B91A3;
    --line: rgba(23, 26, 33, 0.10); --line-strong: rgba(23, 26, 33, 0.18);
    --iris: #6366F1; --iris-deep: #4F46E5; --iris-soft: #EEF0FE;
    --shadow-sm: 0 1px 2px rgba(23, 26, 33, 0.05), 0 2px 8px rgba(23, 26, 33, 0.05);
    --shadow-md: 0 2px 6px rgba(23, 26, 33, 0.06), 0 10px 28px rgba(23, 26, 33, 0.08);
    --shadow-xl: 0 8px 24px rgba(9, 11, 15, 0.18), 0 28px 64px rgba(9, 11, 15, 0.22);
  }
  :root[data-theme="dark"] {
    --bg: #0B0D12; --bg-soft: #10131A; --raised: #141822; --ink: #F2F3F7;
    --muted: #A6ACBD; --subtle: #737A8C;
    --line: rgba(242, 243, 247, 0.10); --line-strong: rgba(242, 243, 247, 0.20);
    --iris: #818CF8; --iris-deep: #6366F1; --iris-soft: rgba(99, 102, 241, 0.16);
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.35);
    --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.45), 0 10px 28px rgba(0, 0, 0, 0.4);
    --shadow-xl: 0 8px 24px rgba(0, 0, 0, 0.5), 0 28px 64px rgba(0, 0, 0, 0.55);
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background:
      radial-gradient(56% 34% at 50% -4%, var(--iris-soft) 0%, transparent 72%),
      var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { text-wrap: balance; }
  a { color: inherit; }
  img { max-width: 100%; }
  :focus-visible { outline: 2px solid var(--iris); outline-offset: 3px; border-radius: 4px; }

  .wrap { max-width: 1080px; margin: 0 auto; padding-left: 24px; padding-right: 24px; }
  section { padding-top: 110px; }

  html.js .rv { opacity: 0; transform: translateY(18px); transition: opacity .6s cubic-bezier(.32,.72,0,1), transform .6s cubic-bezier(.32,.72,0,1); }
  html.js .rv.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    html.js .rv { opacity: 1; transform: none; transition: none; }
    * { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
  }

  /* ── Nav ── */
  .nav-shell {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 0.5px solid var(--line);
  }
  .nav { display: flex; align-items: center; gap: 20px; height: 64px; }
  /* Wordmark officiel (identique à la page de connexion de l'app) : Geist medium, point atténué */
  .logo { font-family: var(--font-sans); font-size: 22px; font-weight: 500; letter-spacing: -0.025em; text-decoration: none; color: var(--ink); }
  .logo b { color: var(--subtle); font-weight: 500; }
  .nav-links { display: flex; gap: 2px; flex: 1; }
  .nav-links a { padding: 13px 12px; min-height: 44px; display: inline-flex; align-items: center; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; color: var(--muted); }
  .nav-links a:hover { color: var(--ink); background: var(--bg-soft); }
  .nav-cta { display: flex; gap: 8px; margin-left: auto; align-items: center; }
  .link-quiet { font-size: 14px; font-weight: 500; color: var(--muted); text-decoration: none; padding: 10px 12px; min-height: 44px; display: inline-flex; align-items: center; }
  @media (max-width: 760px) { .nav-links { display: none; } }

  .btn {
    display: inline-flex; align-items: center; gap: 8px; min-height: 48px;
    padding: 12px 26px; border-radius: 10px; border: none; cursor: pointer;
    background: var(--iris-deep); color: #fff;
    font-family: var(--font-sans); font-size: 16px; font-weight: 500; text-decoration: none;
    box-shadow: 0 2px 12px var(--iris-glow), inset 0 1px 0 rgba(255,255,255,.22);
    transition: transform .15s cubic-bezier(.32,.72,0,1), box-shadow .2s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: scale(.98); }
  .btn.small { min-height: 44px; padding: 9px 18px; font-size: 14px; }
  .btn.ghost { background: var(--raised); color: var(--ink); border: 0.5px solid var(--line-strong); box-shadow: var(--shadow-sm); }
  .btn .arr { transition: transform .18s; }
  .btn:hover .arr { transform: translateX(3px); }

  /* ── Hero ── */
  .hero { padding-top: 56px; text-align: center; }
  .hero .kicker {
    display: inline-block;
    font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--iris);
  }
  @media (max-width: 520px) { .hero .kicker .kicker-extra { display: none; } }
  .hero h1 {
    font-family: var(--font-display); font-weight: 420;
    font-size: clamp(31px, 5vw, 54px); line-height: 1.1; letter-spacing: -0.025em;
    margin: 14px auto 0; max-width: 820px;
  }
  .hero .sub {
    font-size: 18.5px; line-height: 1.65; color: var(--muted);
    max-width: 640px; margin: 20px auto 0;
  }
  .hero-cta { margin-top: 28px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .hero-cta .hint { font-size: 13px; color: var(--subtle); }
  .cta-hint { font-size: 13px; color: var(--subtle); text-align: center; margin: 10px 0 0; }

  .h-in { opacity: 0; transform: translateY(14px); animation: hin .65s cubic-bezier(.32,.72,0,1) forwards; }
  .h-in.d1 { animation-delay: .08s; } .h-in.d2 { animation-delay: .18s; }
  .h-in.d3 { animation-delay: .28s; } .h-in.d4 { animation-delay: .42s; }
  @keyframes hin { to { opacity: 1; transform: none; } }

  /* ── Le deck du matin (réplique fidèle de l'app) ── */
  .deck-zone { margin-top: 52px; text-align: left; }
  .nightbar { display: flex; align-items: center; gap: 12px; font-size: 12.5px; color: var(--subtle); padding: 0 4px 14px; }
  .nightbar .time { font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: .04em; }
  .nightbar .track {
    position: relative; flex: 1; height: 2px; border-radius: 2px;
    background: linear-gradient(90deg, var(--night-1), var(--night-2) 38%, #A5B4FC 86%, #E0E4FE 100%);
  }
  .nightbar .spark {
    position: absolute; top: 50%; left: 8%; width: 8px; height: 8px; border-radius: 50%;
    background: #C7CDFB; transform: translate(-50%, -50%);
    animation: sweep 2.6s cubic-bezier(.32,.72,0,1) .6s forwards;
  }
  @keyframes sweep { to { left: 100%; } }

  .hero-bien {
    position: relative; overflow: hidden; border-radius: 22px; min-height: 380px;
    display: flex; flex-direction: column; justify-content: flex-end;
    box-shadow: var(--shadow-xl); color: #fff;
  }
  .hero-bien img.photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .hero-bien .scrim {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(10,18,28,.94) 0%, rgba(13,24,38,.55) 46%, rgba(15,30,48,.15) 72%, rgba(18,34,54,.42) 100%);
  }
  .hero-bien .flag {
    position: absolute; top: 16px; left: 16px; z-index: 2;
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--iris-deep); color: #fff;
    font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em;
    padding: 6px 12px; border-radius: 8px;
  }
  .hero-bien .flag i { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .hero-bien .inner { position: relative; z-index: 2; padding: 26px 28px; }
  .hero-bien .eyebrow {
    font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .14em;
    color: rgba(255,255,255,.65); margin: 0 0 8px;
  }
  .hero-bien h2 {
    font-family: var(--font-display); font-weight: 420;
    font-size: clamp(25px, 3.4vw, 33px); line-height: 1.15; letter-spacing: -0.02em; margin: 0;
  }
  .hero-bien .row { display: flex; align-items: baseline; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .hero-bien .prix { font-size: 24px; font-weight: 500; font-variant-numeric: tabular-nums; }
  .hero-bien .prix span { font-size: 16px; opacity: .65; font-weight: 400; }
  .hero-bien .meta { font-size: 14px; color: rgba(255,255,255,.72); }
  .agent-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 18px; }
  .achip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 12px 7px 8px; border-radius: 10px;
    background: rgba(255,255,255,.12); border: 0.5px solid rgba(255,255,255,.2);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    font-size: 13.5px; color: rgba(255,255,255,.94);
    opacity: 0; transform: translateY(8px);
    animation: hin .5s cubic-bezier(.32,.72,0,1) forwards;
  }
  .achip:nth-child(1) { animation-delay: 1.1s; }
  .achip:nth-child(2) { animation-delay: 1.35s; }
  .achip:nth-child(3) { animation-delay: 1.6s; }
  .achip b { font-weight: 600; color: #fff; }
  .face { border-radius: 50%; flex: none; object-fit: cover; display: inline-block; }

  /* Bandeau « ils ont travaillé » sous le deck — réplique de l'app */
  .worked {
    display: flex; align-items: center; gap: 18px; margin-top: 18px; padding: 15px 20px;
    background: var(--raised); border-radius: 16px; box-shadow: var(--shadow-sm);
    border: 0.5px solid var(--line); flex-wrap: wrap;
  }
  .worked .faces { display: flex; }
  .worked .faces .face { box-shadow: 0 0 0 2.5px var(--raised); }
  .worked .faces .face + .face { margin-left: -9px; }
  .worked p { margin: 0; flex: 1; min-width: 220px; font-size: 14.5px; color: var(--muted); }
  .worked p b { color: var(--ink); font-weight: 600; }
  .worked p .n { font-variant-numeric: tabular-nums; }

  /* ── Rangée équipe (visages réels) ── */
  .team-strip { display: flex; gap: 26px; flex-wrap: wrap; justify-content: center; margin-top: 34px; }
  .member { text-align: center; width: 86px; }
  .member img { width: 64px; height: 64px; box-shadow: inset 0 0 0 1px var(--line-strong), var(--shadow-sm); }
  .member .nm { font-size: 13.5px; font-weight: 600; margin: 8px 0 0; }
  .member .rl { font-size: 11.5px; color: var(--subtle); margin: 1px 0 0; line-height: 1.35; }

  .tag {
    display: inline-flex; align-items: center; gap: 10px;
    color: var(--iris); font-size: 12px; font-weight: 650;
    text-transform: uppercase; letter-spacing: 0.14em;
  }
  .tag::before { content: ""; width: 22px; height: 2px; border-radius: 1px; background: var(--iris); }
  h2.title {
    font-family: var(--font-display); font-weight: 420;
    font-size: clamp(28px, 3.9vw, 40px); line-height: 1.12; letter-spacing: -0.02em;
    margin: 16px 0 0;
  }
  p.sub { font-size: 17px; line-height: 1.65; color: var(--muted); margin: 14px 0 0; max-width: 620px; }

  .bubble {
    padding: 11px 15px; border-radius: 16px; font-size: 14.5px; line-height: 1.5;
    width: fit-content; max-width: 92%;
  }
  .bubble.me { background: var(--iris-deep); color: #fff; justify-self: end; border-bottom-right-radius: 5px; }
  .bubble.them {
    background: var(--raised); border: 0.5px solid var(--line); box-shadow: var(--shadow-sm);
    border-bottom-left-radius: 5px; display: flex; gap: 9px; align-items: flex-start;
  }
  .bubble.them .face { margin-top: 2px; }
  .bubble .channel { display: block; font-size: 11px; opacity: .65; margin-top: 4px; }

  .member { position: relative; }
  .member .presence {
    position: absolute; top: 48px; right: 8px; width: 13px; height: 13px; border-radius: 50%;
    background: var(--success); box-shadow: 0 0 0 2.5px var(--bg);
  }
  .member.offline img { filter: grayscale(1); opacity: .5; }
  .member.offline .presence { background: var(--subtle); }
  .member.offline .nm { color: var(--muted); }
  .member.offline .soon-tag {
    display: inline-block; margin-top: 3px; padding: 2px 8px; border-radius: 999px;
    background: var(--bg-soft); border: 0.5px solid var(--line);
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--subtle);
  }
  /* ── #preuve : la pile de valeur (spec §3.5, design-notes §4.4).
       Séquence unique : 6 lignes en stagger 50 ms (400 ms chacune) → compteur RAF
       animNum 0→2 000 (1,5 s, démarré une fois la pile posée) → « plus de
       2 000 €/mois » se raye (scaleX — transform only) → « 97 € » tombe en spring.
       UN SEUL IO sur .vzone, trigger once. no-JS / reduced-motion : état final
       complet (pile visible, total déjà rayé, 97 € posé), zéro animation. ── */
  .vzone { max-width: 760px; margin: 44px auto 0; }
  .vstack {
    background: var(--raised); border: 0.5px solid var(--line); border-radius: 20px;
    box-shadow: var(--shadow-md); padding: 6px 28px 0;
  }
  .vs-head, .vs-row {
    display: grid; grid-template-columns: minmax(0, 1fr) 172px 116px;
    column-gap: 18px; align-items: center;
  }
  .vs-head { padding: 15px 0 11px; border-bottom: 0.5px solid var(--line); }
  .vs-head span { font-size: 10.5px; font-weight: 650; text-transform: uppercase; letter-spacing: .1em; color: var(--subtle); }
  .vs-head span + span { text-align: right; }
  .vs-row { padding: 13px 0; border-bottom: 0.5px solid var(--line); }
  .vstack .vs-row:nth-last-child(2) { border-bottom: none; }
  .vs-job { margin: 0; font-size: 14px; line-height: 1.45; color: var(--ink); font-weight: 500; }
  .vs-price { margin: 0; text-align: right; }
  .vs-price .amt {
    font-family: var(--font-display); font-weight: 420; font-size: 18px;
    color: var(--ink); font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .vs-price .per { display: block; font-size: 11.5px; line-height: 1.4; color: var(--subtle); }
  .vs-price .none { font-size: 13px; color: var(--subtle); }
  .vs-agent { margin: 0; display: flex; align-items: center; gap: 9px; justify-content: flex-end; font-size: 14px; }
  .vs-agent b { font-weight: 600; }
  .vs-agent .face { box-shadow: inset 0 0 0 1px var(--line-strong); }
  .vs-total {
    display: flex; flex-wrap: wrap; justify-content: space-between; align-items: baseline;
    gap: 2px 18px; padding: 16px 0 18px; border-top: 1.5px solid var(--line-strong);
  }
  .vs-total-l { margin: 0; font-size: 13.5px; color: var(--muted); transition: color .35s; }
  .vs-sum {
    position: relative; margin-left: auto; text-decoration: none; white-space: nowrap;
    font-size: 15px; color: var(--ink); display: inline-flex; align-items: baseline; gap: 7px;
    transition: color .35s;
  }
  .vs-sum b {
    font-family: var(--font-display); font-weight: 420; letter-spacing: -0.01em;
    font-size: clamp(24px, 3.2vw, 31px); line-height: 1; font-variant-numeric: tabular-nums;
  }
  .vs-sum .unit { font-size: 13px; color: currentColor; opacity: .72; }
  .vs-sum::after {
    content: ""; position: absolute; left: -2%; right: -2%; top: 54%; height: 2.5px;
    border-radius: 2px; background: currentColor;
    transform: scaleX(1); transform-origin: left center;
    transition: transform .32s ease-out;
  }
  .vs-punch { text-align: center; margin-top: clamp(30px, 5vw, 44px); }
  .vs-97 { margin: 0; font-family: var(--font-display); font-weight: 420; font-size: clamp(21px, 3vw, 27px); letter-spacing: -0.015em; color: var(--ink); }
  .vs-97 b {
    display: block; margin-top: 8px; font-weight: 440; color: var(--iris);
    font-size: clamp(64px, 11vw, 112px); line-height: .95; letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }
  .vs-97 .pm { font-size: clamp(20px, 3.4vw, 32px); font-weight: 420; letter-spacing: -0.01em; color: var(--subtle); margin-left: 2px; }
  .vs-sub { margin: 16px auto 0; font-size: 16.5px; line-height: 1.6; color: var(--muted); max-width: 460px; }

  /* La séquence (armed = état initial, play/struck/landed = timeline pilotée JS) */
  html.js .vzone.armed .vs-head { opacity: 0; }
  html.js .vzone.armed .vs-row { opacity: 0; transform: translateY(16px); }
  html.js .vzone.armed .vs-total { opacity: 0; }
  html.js .vzone.armed .vs-punch { opacity: 0; transform: translateY(-10px) scale(1.06); }
  html.js .vzone.armed .vs-sum::after { transform: scaleX(0); }
  .vzone.play .vs-head { animation: vsIn .4s cubic-bezier(.32,.72,0,1) forwards; }
  .vzone.play .vs-row:nth-child(2) { animation: vsIn .4s cubic-bezier(.32,.72,0,1) .10s forwards; }
  .vzone.play .vs-row:nth-child(3) { animation: vsIn .4s cubic-bezier(.32,.72,0,1) .15s forwards; }
  .vzone.play .vs-row:nth-child(4) { animation: vsIn .4s cubic-bezier(.32,.72,0,1) .20s forwards; }
  .vzone.play .vs-row:nth-child(5) { animation: vsIn .4s cubic-bezier(.32,.72,0,1) .25s forwards; }
  .vzone.play .vs-row:nth-child(6) { animation: vsIn .4s cubic-bezier(.32,.72,0,1) .30s forwards; }
  .vzone.play .vs-row:nth-child(7) { animation: vsIn .4s cubic-bezier(.32,.72,0,1) .35s forwards; }
  .vzone.play .vs-total { animation: vsIn .45s cubic-bezier(.32,.72,0,1) .8s forwards; }
  html.js .vzone.struck .vs-sum::after { transform: scaleX(1); }
  .vzone.landed .vs-sum, .vzone.landed .vs-total-l { color: var(--subtle); }
  .vzone.landed .vs-punch { animation: vsDrop .45s cubic-bezier(.34,1.3,.5,1) forwards; }
  @keyframes vsIn { to { opacity: 1; transform: none; } }
  @keyframes vsDrop { to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    html.js .vzone.armed .vs-head, html.js .vzone.armed .vs-row,
    html.js .vzone.armed .vs-total, html.js .vzone.armed .vs-punch { opacity: 1; transform: none; }
    html.js .vzone.armed .vs-sum::after { transform: scaleX(1); }
  }

  /* Mobile 390 : le tableau devient des lignes empilées — jamais de scroll horizontal */
  @media (max-width: 640px) {
    .vstack { padding: 4px 18px 0; }
    .vs-head { display: none; }
    .vs-row {
      grid-template-columns: minmax(0, 1fr) auto;
      grid-template-areas: "job job" "price agent";
      row-gap: 7px; padding: 14px 0;
    }
    .vs-job { grid-area: job; }
    .vs-price { grid-area: price; text-align: left; }
    .vs-price .per { display: inline; margin-left: 4px; }
    .vs-agent { grid-area: agent; }
  }

  /* ── Bande preuve (dogfood, fusionnée sous la pile) ── */
  .vs-proof { margin-top: clamp(56px, 8vw, 72px); }
  .vs-proof-lead { margin: 0 auto; text-align: center; font-size: 15px; line-height: 1.6; color: var(--muted); max-width: 560px; }
  .vs-proof-lead b { color: var(--ink); font-weight: 600; }
  .vs-hours { margin: 22px 0 0; text-align: center; font-size: 14.5px; line-height: 1.6; color: var(--muted); }
  .vs-hours b { color: var(--ink); font-weight: 600; }
  .vs-hours .faqref { color: var(--subtle); font-size: 13px; }
  .proof-grid { display: grid; gap: 14px; margin-top: 26px; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); }
  .proof-tile {
    background: var(--raised); border: 0.5px solid var(--line); border-radius: 16px;
    box-shadow: var(--shadow-sm); padding: 24px 20px; text-align: center;
  }
  .proof-tile .n { margin: 0; font-family: var(--font-display); font-weight: 420; font-size: 38px; color: var(--ink); font-variant-numeric: tabular-nums; line-height: 1; }
  .proof-tile .n b { color: var(--iris); font-weight: 420; }
  .proof-tile .l { margin: 10px 0 0; font-size: 14px; line-height: 1.5; color: var(--muted); }
  .proof-note { margin: 18px 0 0; text-align: center; font-size: 13px; color: var(--subtle); }

  /* ── « Ton CRM devient vivant » : la séquence commande → fiche se JOUE au scroll ── */
  .cr-slot { position: relative; }
  .cr-typing { position: absolute; top: 0; left: 0; opacity: 0; }
  html.js .cmd-result.armed .bubble.me { opacity: 0; transform: translateY(14px); }
  html.js .cmd-result.armed .result-card { opacity: 0; transform: translateY(16px) scale(.97); }
  html.js .cmd-result.armed .result-card li { opacity: 0; transform: translateX(-8px); }
  .cmd-result.play .bubble.me { animation: crUp .55s cubic-bezier(.32,.72,0,1) .1s forwards; }
  .cmd-result.play .cr-typing { animation: crTyping 1.1s linear .65s forwards; }
  .cmd-result.play .result-card { animation: crPop .6s cubic-bezier(.34,1.3,.5,1) 1.75s forwards; }
  .cmd-result.play .result-card .ok svg path { stroke-dasharray: 30; stroke-dashoffset: 30; animation: crCheck .5s ease-out 2.05s forwards; }
  .cmd-result.play .result-card li:nth-child(1) { animation: crRow .4s ease-out 2.15s forwards; }
  .cmd-result.play .result-card li:nth-child(2) { animation: crRow .4s ease-out 2.35s forwards; }
  .cmd-result.play .result-card li:nth-child(3) { animation: crRow .4s ease-out 2.55s forwards; }
  @keyframes crUp { to { opacity: 1; transform: none; } }
  @keyframes crTyping { 0% { opacity: 0; } 12% { opacity: 1; } 86% { opacity: 1; } 100% { opacity: 0; } }
  @keyframes crPop { to { opacity: 1; transform: none; } }
  @keyframes crRow { to { opacity: 1; transform: none; } }
  @keyframes crCheck { to { stroke-dashoffset: 0; } }
  @media (prefers-reduced-motion: reduce) {
    html.js .cmd-result.armed .bubble.me, html.js .cmd-result.armed .result-card,
    html.js .cmd-result.armed .result-card li { opacity: 1; transform: none; }
    .cmd-result.play .cr-typing { animation: none; }
  }
  /* ── Équipe : 6 blocs complets, alternés — la conversation se joue au scroll
       (mécanique #modelo réutilisée, classes préfixées tc-/tb-, cf task 4) ── */
  .tblock {
    display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 440px);
    grid-template-areas: "head chat" "detail chat";
    column-gap: clamp(36px, 6vw, 72px); align-items: start; align-content: start;
    margin-top: clamp(64px, 9vw, 92px);
  }
  .tblock.tb-alt { grid-template-columns: minmax(0, 440px) minmax(0, 1fr); grid-template-areas: "chat head" "chat detail"; }
  .tb-head { grid-area: head; display: flex; align-items: center; gap: 18px; }
  .tb-ava { position: relative; flex: none; }
  .tb-ava img { width: 84px; height: 84px; box-shadow: inset 0 0 0 1px var(--line-strong), var(--shadow-sm); }
  .tb-dot {
    position: absolute; right: 3px; bottom: 4px; width: 15px; height: 15px; border-radius: 50%;
    background: var(--success); box-shadow: 0 0 0 3px var(--bg);
  }
  .tb-name { margin: 0; font-family: var(--font-display); font-weight: 420; font-size: clamp(25px, 2.7vw, 30px); line-height: 1.1; letter-spacing: -0.01em; }
  .tb-role { margin: 6px 0 0; font-size: 12px; font-weight: 650; text-transform: uppercase; letter-spacing: .1em; color: var(--iris); }
  .tb-detail { grid-area: detail; margin-top: 24px; }
  .tb-caps { list-style: none; margin: 0; padding: 0; display: grid; gap: 11px; }
  .tb-caps li { display: flex; gap: 10px; align-items: flex-start; font-size: 14.5px; line-height: 1.55; color: var(--ink); }
  .tb-caps svg { width: 17px; height: 17px; color: var(--iris); flex: none; margin-top: 3.5px; }
  .tb-autos {
    margin-top: 24px; padding: 18px 20px;
    background: var(--bg-soft); border: 0.5px solid var(--line); border-radius: 14px;
  }
  .tb-autos-t { margin: 0 0 12px; font-size: 11px; font-weight: 650; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); }
  .tb-autos ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 11px; }
  .tb-autos li b { display: block; font-size: 13.5px; font-weight: 600; color: var(--ink); line-height: 1.4; }
  .tb-autos li span { display: block; font-size: 13px; line-height: 1.5; color: var(--muted); margin-top: 1px; }
  .tb-talk { margin-top: 24px; }

  .tc-panel {
    grid-area: chat; align-self: center; justify-self: stretch; width: 100%;
    background: var(--raised); border: 0.5px solid var(--line); border-radius: 20px;
    box-shadow: var(--shadow-md); overflow: hidden;
  }
  .tc-head { display: flex; align-items: center; gap: 10px; padding: 13px 18px; border-bottom: 0.5px solid var(--line); }
  .tc-head img { width: 30px; height: 30px; }
  .tc-who { font-size: 14px; font-weight: 600; }
  .tc-live { margin-left: auto; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .tc-live i { width: 7px; height: 7px; border-radius: 50%; background: var(--success); }
  .tc-thread { padding: 18px 18px 20px; display: grid; gap: 12px; }
  .tc-panel .bubble.them, .tc-panel .typing { background: color-mix(in srgb, var(--ink) 6%, var(--raised)); box-shadow: none; }
  .tc-slot { position: relative; }
  .tc-typing { position: absolute; top: 0; left: 0; opacity: 0; }
  .tc-a strong {
    display: inline-block; font-weight: 600; color: var(--ink);
    font-variant-numeric: tabular-nums;
    background: var(--iris-soft); border-radius: 5px; padding: 0 3px; margin: 0 -1px;
  }

  @media (max-width: 880px) {
    .tblock, .tblock.tb-alt {
      grid-template-columns: minmax(0, 1fr);
      grid-template-areas: "head" "chat" "detail";
    }
    .tc-panel { margin-top: 22px; }
    .tb-ava img { width: 72px; height: 72px; }
  }

  /* La séquence jouée : armed = état initial, play = timeline (cf design-notes §4.2).
     Le portrait/nom (.tb-head) reste sur le reveal .rv générique — toujours visible
     en approche, pour ne jamais laisser un « trou » entre deux blocs au scroll. */
  html.js .tblock.armed .tc-panel,
  html.js .tblock.armed .tb-autos, html.js .tblock.armed .tb-talk { opacity: 0; transform: translateY(14px); }
  html.js .tblock.armed .tb-dot { transform: scale(0); }
  html.js .tblock.armed .tc-q { opacity: 0; transform: translateY(12px); }
  html.js .tblock.armed .tc-a { opacity: 0; transform: translateY(14px); }
  html.js .tblock.armed .tb-caps li { opacity: 0; transform: translateX(-8px); }
  .tblock.play .tc-panel { animation: tcIn .5s cubic-bezier(.32,.72,0,1) forwards; }
  .tblock.play .tb-dot { animation: tcPop .3s cubic-bezier(.34,1.56,.64,1) .4s forwards; }
  .tblock.play .tc-q { animation: tcIn .45s cubic-bezier(.32,.72,0,1) .35s forwards; }
  .tblock.play .tc-typing { animation: tcTyping .9s linear .78s forwards; }
  .tblock.play .tc-a { animation: tcIn .42s cubic-bezier(.32,.72,0,1) 1.55s forwards; }
  .tblock.play .tc-a strong { animation: tcPunch .45s cubic-bezier(.34,1.3,.5,1) 2s; }
  .tblock.play .tb-caps li { animation: tcRow .35s ease-out forwards; }
  .tblock.play .tb-caps li:nth-child(1) { animation-delay: 1.8s; }
  .tblock.play .tb-caps li:nth-child(2) { animation-delay: 1.84s; }
  .tblock.play .tb-caps li:nth-child(3) { animation-delay: 1.88s; }
  .tblock.play .tb-caps li:nth-child(4) { animation-delay: 1.92s; }
  .tblock.play .tb-caps li:nth-child(5) { animation-delay: 1.96s; }
  .tblock.play .tb-autos { animation: tcIn .45s cubic-bezier(.32,.72,0,1) 2.05s forwards; }
  .tblock.play .tb-talk { animation: tcIn .4s cubic-bezier(.32,.72,0,1) 2.2s forwards; }
  @keyframes tcIn { to { opacity: 1; transform: none; } }
  @keyframes tcPop { to { transform: scale(1); } }
  @keyframes tcTyping { 0% { opacity: 0; } 12% { opacity: 1; } 86% { opacity: 1; } 100% { opacity: 0; } }
  @keyframes tcRow { to { opacity: 1; transform: none; } }
  @keyframes tcPunch { 0% { transform: none; } 35% { transform: scale(1.13); } 100% { transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    html.js .tblock.armed .tc-panel,
    html.js .tblock.armed .tb-autos, html.js .tblock.armed .tb-talk,
    html.js .tblock.armed .tc-q, html.js .tblock.armed .tc-a,
    html.js .tblock.armed .tb-caps li { opacity: 1; transform: none; }
    html.js .tblock.armed .tb-dot { transform: none; }
    .tblock.play .tc-typing, .tblock .tc-typing { animation: none; }
  }

  /* ── Checklist (base réutilisée par .plan .checklist en #tarif) ── */
  .checklist { list-style: none; padding: 0; margin: 24px 0 0; display: grid; gap: 12px; }
  .checklist li { display: flex; gap: 10px; align-items: flex-start; font-size: 14.5px; color: rgba(242,243,247,.86); }
  .checklist svg { width: 17px; height: 17px; color: #A5B4FC; flex: none; margin-top: 3px; }

  /* ── Tarif : 3 offres ── */
  .plans { display: grid; gap: 16px; margin-top: 38px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); align-items: stretch; }
  .plan {
    position: relative; display: flex; flex-direction: column;
    background: var(--raised); border-radius: 18px; padding: 28px 26px;
    border: 0.5px solid var(--line); box-shadow: var(--shadow-sm);
  }
  .plan.featured { border: 1.5px solid var(--iris); box-shadow: var(--shadow-md); }
  .plan .badge {
    position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    padding: 4px 14px; border-radius: 999px; white-space: nowrap;
    background: var(--iris-deep); color: #fff; font-size: 11.5px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .08em;
  }
  .plan h3 { margin: 0; font-size: 19px; font-weight: 600; letter-spacing: -0.01em; }
  .plan .for { margin: 4px 0 0; font-size: 13.5px; color: var(--subtle); }
  .plan .amount {
    font-family: var(--font-display); font-weight: 420;
    font-size: 40px; line-height: 1; margin: 20px 0 0; font-variant-numeric: tabular-nums;
  }
  .plan .amount .unit { font-size: 14px; color: var(--subtle); font-family: var(--font-sans); }
  .plan .bill-note { margin: 8px 0 0; font-size: 12.5px; color: var(--subtle); font-variant-numeric: tabular-nums; }
  .plan .checklist { margin: 20px 0 24px; gap: 10px; flex: 1; }
  .plan .checklist li { color: var(--muted); font-size: 14px; }
  .plan .checklist svg { color: var(--iris); }
  .plan .btn { width: 100%; justify-content: center; }
  .plan .plan-hint {
    margin: 10px 0 0; font-size: 12.5px; line-height: 1.5; color: var(--subtle);
    text-align: center; font-variant-numeric: tabular-nums;
  }

  /* ── Tarif : toggle Mensuel/Annuel (task 8) — segmenté, cible ≥44px ── */
  .bill-toggle {
    display: flex; width: fit-content; margin: 34px auto 0; padding: 4px; gap: 4px;
    border-radius: 999px; background: var(--raised);
    border: 0.5px solid var(--line); box-shadow: var(--shadow-sm);
  }
  html:not(.js) .bill-toggle { display: none; } /* sans JS : Mensuel statique, pas de contrôle mort */
  .bt-opt {
    position: relative; display: inline-flex; align-items: center; gap: 8px;
    min-height: 44px; padding: 0 20px; border-radius: 999px; cursor: pointer;
    font-size: 14px; font-weight: 550; color: var(--muted);
    transition: background .2s cubic-bezier(.32,.72,0,1), color .2s cubic-bezier(.32,.72,0,1);
  }
  .bt-opt input { position: absolute; opacity: 0; pointer-events: none; }
  .bt-opt:hover { color: var(--ink); }
  .bt-opt:has(input:checked) { background: var(--iris-deep); color: #fff; }
  .bt-opt:has(input:focus-visible) { outline: 2px solid var(--iris); outline-offset: 3px; }
  .bt-badge {
    padding: 3px 9px; border-radius: 999px; white-space: nowrap;
    font-size: 11px; font-weight: 650; letter-spacing: .02em;
    background: var(--iris-soft); color: var(--iris);
  }
  .bt-opt:has(input:checked) .bt-badge { background: rgba(255,255,255,.16); color: #fff; }

  /* ── Tarif : bascule des montants — les deux variantes sont empilées dans une
       grid (largeur/hauteur réservées = zéro saut de layout), seul transform/
       opacity bouge : le « glissement des prix », moment signé de la section. ── */
  .swap { display: inline-grid; }
  .swap > span {
    grid-area: 1 / 1; justify-self: start; visibility: hidden; opacity: 0;
    transition: opacity .22s cubic-bezier(.32,.72,0,1), transform .22s cubic-bezier(.32,.72,0,1), visibility 0s .22s;
  }
  .plan-hint .swap > span { justify-self: center; }
  #tarif[data-billing="monthly"] .swap > .sw-y { transform: translateY(10px); }
  #tarif[data-billing="yearly"] .swap > .sw-m { transform: translateY(-10px); }
  #tarif[data-billing="monthly"] .swap > .sw-m,
  #tarif[data-billing="yearly"] .swap > .sw-y {
    visibility: visible; opacity: 1; transform: none; transition-delay: 0s;
  }
  @media (prefers-reduced-motion: reduce) { .swap > span, .bt-opt { transition: none; } }

  /* ── Tarif : garanties sous la grille ── */
  .garanties {
    list-style: none; margin: 28px auto 0; padding: 0;
    display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 24px;
  }
  .garanties li { display: inline-flex; align-items: center; gap: 8px; font-size: 13.5px; color: var(--muted); }
  .garanties svg { width: 15px; height: 15px; color: var(--iris); flex: none; }

  /* ── Modal réservation d'essai ── */
  .wl-overlay {
    position: fixed; inset: 0; z-index: 100; display: none;
    align-items: center; justify-content: center; padding: 20px;
    background: rgba(9, 11, 15, 0.55);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .wl-overlay.open { display: flex; }
  .wl-modal {
    width: min(430px, 100%); background: var(--raised); border-radius: 20px;
    box-shadow: var(--shadow-xl); padding: 30px 28px; position: relative;
  }
  .wl-modal h3 { margin: 0; font-family: var(--font-display); font-weight: 420; font-size: 24px; letter-spacing: -0.01em; }
  .wl-modal .wl-sub { margin: 8px 0 0; font-size: 14px; color: var(--muted); line-height: 1.55; }
  .wl-close {
    position: absolute; top: 14px; right: 14px; width: 36px; height: 36px;
    display: grid; place-items: center; border: none; cursor: pointer;
    background: var(--bg-soft); color: var(--muted); border-radius: 50%; font-size: 15px;
  }
  .wl-form { margin-top: 20px; display: grid; gap: 12px; }
  .wl-form label { font-size: 12.5px; font-weight: 600; color: var(--muted); display: grid; gap: 5px; }
  .wl-form input, .wl-form select {
    width: 100%; min-height: 46px; padding: 10px 14px; border-radius: 10px;
    border: 1px solid var(--line-strong); background: var(--bg);
    font-family: var(--font-sans); font-size: 15px; color: var(--ink);
  }
  .wl-form input:focus, .wl-form select:focus { outline: 2px solid var(--iris); outline-offset: 1px; border-color: transparent; }
  .wl-hp { position: absolute; left: -9999px; opacity: 0; height: 0; overflow: hidden; }
  .wl-success { text-align: center; padding: 18px 0 6px; }
  .wl-success .check {
    width: 52px; height: 52px; margin: 0 auto 14px; border-radius: 50%;
    display: grid; place-items: center; background: var(--iris-soft); color: var(--iris);
  }
  .wl-error { display: none; margin: 4px 0 0; font-size: 13px; color: #D92D20; line-height: 1.5; }
  .wl-error a { color: var(--iris); font-weight: 600; }

  /* ── FAQ ── */
  .faq-grid { display: grid; gap: 40px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
  .faq-item { border-bottom: 0.5px solid var(--line); }
  .faq-item > button {
    width: 100%; min-height: 56px; display: flex; align-items: center; gap: 12px;
    padding: 18px 4px; background: none; border: none; cursor: pointer;
    font-family: var(--font-sans); text-align: left; color: var(--ink);
  }
  .faq-item > button span { flex: 1; font-size: 15.5px; font-weight: 550; }
  .faq-item .chev { color: var(--subtle); transition: transform .2s; flex: none; }
  .faq-item[data-open="true"] .chev { transform: rotate(180deg); }
  .faq-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .28s cubic-bezier(.32,.72,0,1); }
  .faq-item[data-open="true"] .faq-body { grid-template-rows: 1fr; }
  .faq-body > div { overflow: hidden; }
  .faq-body p { margin: 0 4px 18px; font-size: 14.5px; line-height: 1.7; color: var(--muted); max-width: 620px; }

  /* ── CTA final ── */
  .final { text-align: center; padding: clamp(44px, 6vw, 76px) 0 0; }
  .faq-grid { align-items: start; }
  .faq-grid > .rv:first-child { position: sticky; top: 88px; }
  @media (max-width: 700px) { .faq-grid > .rv:first-child { position: static; } }
  .final .faces { display: flex; justify-content: center; margin-bottom: 22px; }
  .final .faces .face { box-shadow: 0 0 0 3px var(--bg); }
  .final .faces .face + .face { margin-left: -12px; }

  footer { border-top: 0.5px solid var(--line); margin-top: 100px; }
  .foot { display: grid; gap: 32px; padding: 48px 0 12px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
  .foot .about { font-size: 14px; color: var(--subtle); margin: 10px 0 0; max-width: 240px; }
  .foot h4 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--subtle); margin: 0 0 12px; }
  .foot a { display: block; padding: 11px 0; font-size: 14px; color: var(--muted); text-decoration: none; }
  .foot a:hover { color: var(--ink); }
  .copyright { font-size: 12.5px; color: var(--subtle); padding: 0 0 36px; margin: 0; }

  svg { display: block; }

  /* ── Modelo : commande → résultat ── */
  .cmd-result { display: grid; gap: 10px; max-width: 500px; }
  .result-card {
    background: var(--raised); border: 0.5px solid var(--line); border-radius: 14px;
    box-shadow: var(--shadow-md); padding: 16px;
  }
  .result-card .ok {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600; color: var(--success); margin: 0 0 10px;
  }
  .result-card .ok svg { width: 15px; height: 15px; }
  .result-card ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 7px; }
  .result-card li { font-size: 14px; color: var(--ink); display: flex; gap: 8px; align-items: baseline; }
  .result-card li b { font-weight: 600; }
  .result-card li .k { color: var(--subtle); font-size: 13px; min-width: 86px; flex: none; }
  .modelo-grid { display: grid; gap: 40px; margin-top: 38px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); align-items: center; }
  .cap-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 13px; }
  .cap-list li { display: flex; gap: 11px; align-items: flex-start; font-size: 15px; color: var(--ink); }
  .cap-list li svg { width: 17px; height: 17px; color: var(--iris); flex: none; margin-top: 4px; }
  .cap-list li span b { font-weight: 600; }
  .cap-list li span i { display: block; font-style: normal; font-size: 13.5px; color: var(--muted); margin-top: 1px; }

  /* ── « Formés à ton métier » (task 6) : sous-titres des deux preuves + radar DPE.
       Le moment signé de la section reste l'animation CRM (.cmd-result) ; la carte
       DPE est une notification STATIQUE — reveal .rv générique uniquement. ── */
  .metier-h3 {
    margin: 0; font-family: var(--font-display); font-weight: 420;
    font-size: clamp(21px, 2.6vw, 26px); line-height: 1.2; letter-spacing: -0.015em;
  }
  .metier-p { margin: 10px 0 0; font-size: 15px; line-height: 1.65; color: var(--muted); max-width: 560px; }
  .metier-p b { color: var(--ink); font-weight: 600; }
  .modelo-grid .cap-list { margin-top: 22px; }
  .dpe-grid {
    display: grid; gap: 40px; margin-top: clamp(56px, 8vw, 76px);
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); align-items: center;
  }
  .dpe-card {
    max-width: 440px; width: 100%;
    background: var(--raised); border: 0.5px solid var(--line); border-radius: 18px;
    box-shadow: var(--shadow-md); padding: 18px; display: grid; gap: 12px;
    align-content: start;
  }
  .dpe-head { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--subtle); }
  .dpe-head b { color: var(--muted); font-weight: 600; }
  .dpe-head time { margin-left: auto; font-variant-numeric: tabular-nums; }
  .dpe-tg { width: 20px; height: 20px; border-radius: 6px; background: #26A5E4; display: grid; place-items: center; flex: none; }
  .dpe-tg svg { width: 12px; height: 12px; fill: #fff; display: block; }
  .dpe-msg { margin: 0; font-size: 14px; line-height: 1.55; color: var(--ink); }
  .dpe-msg b { display: block; font-weight: 650; margin-bottom: 2px; }
  .dpe-msg strong {
    font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums;
    background: var(--iris-soft); border-radius: 5px; padding: 0 3px; margin: 0 -1px;
    white-space: nowrap;
  }
  .metier-breadth { margin: clamp(48px, 7vw, 64px) auto 0; text-align: center; font-size: 14px; line-height: 1.6; color: var(--muted); max-width: 700px; }
  .metier-breadth b { color: var(--ink); font-weight: 600; }
  .metier-more { margin-top: 22px; }

  /* ── Interrupteur (0 usage aujourd'hui — le toggle Mensuel/Annuel des tarifs
       est finalement un contrôle segmenté .bill-toggle, deux radios stylées :
       plus lisible qu'un switch pour un choix nommé, arbitrage task 8) ── */
  .switch {
    flex: none; width: 42px; height: 25px; border-radius: 999px; position: relative;
    background: var(--iris); box-shadow: inset 0 1px 2px rgba(0,0,0,.14);
    border: none; padding: 0; cursor: pointer;
    transition: background .2s cubic-bezier(.32,.72,0,1);
  }
  .switch::after {
    content: ""; position: absolute; top: 2.5px; left: 2.5px; width: 20px; height: 20px;
    border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.25);
    transform: translateX(17px);
    transition: transform .22s cubic-bezier(.32,.72,0,1);
  }
  .switch[aria-checked="false"] { background: var(--line-strong); }
  .switch[aria-checked="false"]::after { transform: none; }

  .typing { display: inline-flex; gap: 4px; padding: 11px 14px; border-radius: 16px; border-bottom-left-radius: 5px;
    background: var(--raised); border: 0.5px solid var(--line); width: fit-content; }
  .typing i { width: 6px; height: 6px; border-radius: 50%; background: var(--subtle); animation: tb 1.2s ease-in-out infinite; }
  .typing i:nth-child(2) { animation-delay: .15s; } .typing i:nth-child(3) { animation-delay: .3s; }
  @keyframes tb { 0%,60%,100% { transform:none; opacity:.5; } 30% { transform:translateY(-4px); opacity:1; } }

  /* ── #controle « Rien ne part sans toi » : storyboard d'approbation (task 5,
       design-notes §4.3). UNE séquence scroll-triggered — ① brouillon email
       ② notif WhatsApp ③ « ok envoie » tapé ④ coche (crCheck) + « Envoyé ».
       armed/play + IO ~0.5 trigger once (mécanique #modelo) ; no-JS / reduced :
       les 3 vignettes statiques à l'état final, lisibles en 2 s. ── */
  .ap-flow { display: grid; grid-template-columns: 1fr 44px 1fr 44px 1fr; align-items: stretch; margin-top: 46px; }
  .ap-step { display: flex; flex-direction: column; min-width: 0; }
  .ap-label {
    margin: 0 0 10px; text-align: center;
    font-size: 11px; font-weight: 650; text-transform: uppercase; letter-spacing: .12em; color: var(--subtle);
  }
  .ap-card {
    flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 12px;
    background: var(--raised); border: 0.5px solid var(--line); border-radius: 18px;
    box-shadow: var(--shadow-md); padding: 18px;
  }
  .ap-arrow { display: grid; place-items: center; padding-top: 28px; color: var(--subtle); }
  .ap-arrow svg { width: 20px; height: 20px; }

  /* ① Le brouillon d'Emma */
  .ap-mail-head { display: flex; align-items: center; gap: 10px; padding-bottom: 12px; border-bottom: 0.5px solid var(--line); }
  .ap-mail-head img { width: 30px; height: 30px; }
  .ap-mail-head .who { min-width: 0; }
  .ap-mail-head .who b { display: block; font-size: 13.5px; font-weight: 600; line-height: 1.3; color: var(--ink); }
  .ap-mail-head .who span { display: block; font-size: 11.5px; color: var(--subtle); }
  .ap-pill {
    margin-left: auto; flex: none; padding: 3px 10px; border-radius: 999px;
    background: var(--iris-soft); color: var(--iris); font-size: 11px; font-weight: 650; letter-spacing: .02em;
  }
  .ap-mail-line { margin: 0; display: flex; gap: 8px; font-size: 12.5px; line-height: 1.5; color: var(--muted); }
  .ap-mail-line .k { flex: none; width: 38px; color: var(--subtle); }
  .ap-mail-line b { color: var(--ink); font-weight: 600; }
  .ap-mail-prev {
    margin: 0; font-size: 12.5px; line-height: 1.55; color: var(--muted);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* ② La notification WhatsApp */
  .ap-notif-head { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--subtle); }
  .ap-notif-head b { color: var(--muted); font-weight: 600; }
  .ap-notif-head time { margin-left: auto; font-variant-numeric: tabular-nums; }
  .ap-wa { width: 20px; height: 20px; border-radius: 6px; background: #25D366; display: grid; place-items: center; flex: none; }
  .ap-wa svg { width: 12px; height: 12px; fill: #fff; display: block; }
  .ap-notif-msg { margin: 0; font-size: 14px; line-height: 1.5; color: var(--ink); }
  .ap-notif-msg b { display: block; font-weight: 650; }

  /* ③ Ta réponse + ④ la coche */
  .ap-input {
    display: flex; align-items: center; gap: 10px; padding: 8px 8px 8px 15px;
    border-radius: 999px; background: var(--bg-soft); border: 0.5px solid var(--line);
  }
  .ap-type { flex: 1; min-width: 0; font-size: 14px; color: var(--ink); white-space: nowrap; overflow: hidden; }
  .ap-type span {
    display: inline-block; white-space: nowrap; overflow: hidden; vertical-align: bottom;
    border-right: 1.5px solid transparent;
  }
  .ap-send { flex: none; width: 30px; height: 30px; border-radius: 50%; background: var(--iris-deep); color: #fff; display: grid; place-items: center; }
  .ap-send svg { width: 14px; height: 14px; }
  .ap-sent {
    display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 12px;
    border-radius: 12px; background: color-mix(in srgb, var(--success) 8%, var(--raised));
    border: 0.5px solid color-mix(in srgb, var(--success) 30%, transparent);
    font-size: 13px; font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums;
  }
  .ap-sent svg { width: 16px; height: 16px; color: var(--success); flex: none; }

  /* La séquence (timings design-notes §4.3 : temps 400-650 ms, starts ~0/0.7/1.45/2.35, total ≈ 3,1 s) */
  html.js .ap-flow.armed .ap-step, html.js .ap-flow.armed .ap-arrow { opacity: 0; }
  html.js .ap-flow.armed .ap-s1 { transform: translateY(14px); }
  html.js .ap-flow.armed .ap-s2 { transform: translateY(12px) scale(.97); }
  html.js .ap-flow.armed .ap-s3 { transform: translateY(14px); }
  html.js .ap-flow.armed .ap-sent { opacity: 0; transform: translateY(10px) scale(.97); }
  html.js .ap-flow.armed .ap-type span { max-width: 0; }
  .ap-flow.play .ap-s1 { animation: apIn .5s cubic-bezier(.32,.72,0,1) forwards; }
  .ap-flow.play .ap-a1 { animation: apIn .25s ease-out .55s forwards; }
  .ap-flow.play .ap-s2 { animation: apIn .45s cubic-bezier(.34,1.3,.5,1) .7s forwards; }
  .ap-flow.play .ap-a2 { animation: apIn .25s ease-out 1.3s forwards; }
  .ap-flow.play .ap-s3 { animation: apIn .4s cubic-bezier(.32,.72,0,1) 1.45s forwards; }
  .ap-flow.play .ap-type span { animation: apType .55s steps(9, end) 1.6s forwards, apCaret .45s step-end 1.55s 3; }
  .ap-flow.play .ap-send { animation: apPress .18s ease-out 2.25s; }
  .ap-flow.play .ap-sent { animation: apIn .45s cubic-bezier(.34,1.3,.5,1) 2.35s forwards; }
  .ap-flow.play .ap-sent svg path { stroke-dasharray: 30; stroke-dashoffset: 30; animation: crCheck .5s ease-out 2.6s forwards; }
  @keyframes apIn { to { opacity: 1; transform: none; } }
  @keyframes apType { to { max-width: 9ch; } }
  @keyframes apCaret { 0%, 100% { border-color: transparent; } 50% { border-color: var(--iris); } }
  @keyframes apPress { 50% { transform: scale(.88); } }
  @media (prefers-reduced-motion: reduce) {
    html.js .ap-flow.armed .ap-step, html.js .ap-flow.armed .ap-arrow,
    html.js .ap-flow.armed .ap-sent { opacity: 1; transform: none; }
    html.js .ap-flow.armed .ap-type span { max-width: none; }
  }

  @media (max-width: 880px) {
    .ap-flow { grid-template-columns: minmax(0, 1fr); max-width: 440px; margin-left: auto; margin-right: auto; row-gap: 10px; }
    .ap-arrow { padding-top: 0; }
    .ap-arrow svg { transform: rotate(90deg); }
  }

  /* ── Connecteurs ── */
  .connectors { display: grid; gap: 12px; margin-top: 38px; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .conn {
    display: flex; align-items: center; gap: 12px; padding: 15px 16px;
    background: var(--raised); border: 0.5px solid var(--line); border-radius: 14px;
    box-shadow: var(--shadow-sm); font-size: 14px; font-weight: 550; color: var(--ink);
    transition: transform .18s cubic-bezier(.32,.72,0,1), border-color .18s;
  }
  .conn:hover { transform: translateY(-2px); border-color: var(--iris); }
  .conn .ci { width: 26px; height: 26px; flex: none; display: grid; place-items: center; }
  .conn .ci svg { display: block; }
  .ci-txt {
    width: 26px; height: 26px; border-radius: 7px; display: grid; place-items: center;
    color: #fff; font-size: 12px; font-weight: 700; letter-spacing: -0.02em;
  }
  .conn-more {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: center; gap: 10px; padding: 15px 16px;
    border: 1.5px dashed var(--line-strong); border-radius: 14px;
    font-size: 14px; font-weight: 550; color: var(--muted); text-align: center;
    text-decoration: none; transition: border-color .18s, color .18s;
  }
  .conn-more:hover { border-color: var(--iris); color: var(--ink); }
  .conn-more b { color: var(--iris); font-weight: 700; }

  /* ── CTA collant mobile ── */
  .sticky-cta {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
    display: none; padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-top: 0.5px solid var(--line);
    transform: translateY(110%); transition: transform .3s cubic-bezier(.32,.72,0,1);
  }
  .sticky-cta.show { transform: none; }
  .sticky-cta .btn { width: 100%; justify-content: center; }
  @media (max-width: 760px) { .sticky-cta { display: block; } }

  /* ── Fixes mobile ── */
  @media (max-width: 520px) {
    .hero-bien .inner { padding-top: 76px; }
    .hero-bien .scrim {
      background: linear-gradient(to top, rgba(10,18,28,.96) 0%, rgba(13,24,38,.72) 55%, rgba(15,30,48,.38) 80%, rgba(18,34,54,.5) 100%);
    }
  }

  /* ── Marquee connecteurs (pattern 21st porté vanilla) ── */
  .conn-marquee { margin-top: 38px; display: grid; gap: 12px; overflow: hidden;
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
    mask-image: linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent); }
  .mq-row { display: flex; gap: 12px; width: max-content; }
  .mq-row .mq-seq { display: flex; gap: 12px; padding-right: 12px; animation: mq var(--mq-dur, 46s) linear infinite; }
  .mq-row.rev .mq-seq { animation-direction: reverse; }
  .conn-marquee:hover .mq-seq { animation-play-state: paused; }
  @keyframes mq { to { transform: translateX(-100%); } }
  .mq-row .conn { flex: none; }
  @media (prefers-reduced-motion: reduce) {
    .mq-row .mq-seq { animation: none; }
    .mq-row { width: auto; flex-wrap: wrap; }
    .mq-row .mq-seq { flex-wrap: wrap; }
    .mq-row .mq-seq[aria-hidden="true"] { display: none; }
    .conn-marquee { mask-image: none; -webkit-mask-image: none; }
  }

  /* ── Le team-strip « rejoint l'équipe » ── */
  html.js .team-strip .member { opacity: 0; transform: translateY(14px) scale(.92); transition: opacity .5s cubic-bezier(.32,.72,0,1), transform .5s cubic-bezier(.32,.72,0,1); }
  html.js .team-strip .member .presence { transform: scale(0); transition: transform .3s cubic-bezier(.34,1.56,.64,1) .35s; }
  html.js .team-strip.joined .member { opacity: 1; transform: none; }
  html.js .team-strip.joined .member .presence { transform: scale(1); }
  html.js .team-strip .member:nth-child(1) { transition-delay: 0s; }
  html.js .team-strip .member:nth-child(2) { transition-delay: .12s; }
  html.js .team-strip .member:nth-child(3) { transition-delay: .24s; }
  html.js .team-strip .member:nth-child(4) { transition-delay: .36s; }
  @media (prefers-reduced-motion: reduce) {
    html.js .team-strip .member, html.js .team-strip .member .presence { opacity: 1; transform: none; transition: none; }
  }

  /* ── Aurora hero (ambiance premium, très lente) ── */
  .hero { position: relative; }
  .hero::before {
    content: ""; position: absolute; z-index: -1; top: -140px; left: 50%; width: min(920px, 96vw); height: 560px;
    transform: translateX(-50%);
    background:
      radial-gradient(40% 46% at 32% 36%, color-mix(in srgb, var(--iris) 16%, transparent), transparent 70%),
      radial-gradient(34% 40% at 68% 30%, rgba(165, 180, 252, .14), transparent 70%);
    filter: blur(38px); pointer-events: none;
    animation: aurora 16s ease-in-out infinite alternate;
  }
  @keyframes aurora {
    to { transform: translateX(-50%) translateY(26px) scale(1.06) rotate(3deg); }
  }
  @media (prefers-reduced-motion: reduce) { .hero::before { animation: none; } }

  /* ── Spotlight au survol (cartes tarifs) ── */
  .plan { position: relative; }
  .plan::before {
    content: ""; position: absolute; inset: 0; pointer-events: none; opacity: 0; border-radius: inherit;
    background: radial-gradient(220px circle at var(--mx, 50%) var(--my, 50%), color-mix(in srgb, var(--iris) 9%, transparent), transparent 65%);
    transition: opacity .25s;
  }
  .plan:hover::before { opacity: 1; }
  @media (hover: none) { .plan::before { display: none; } }

  /* ── Vidéo hero (rendu Remotion) : desktop uniquement, la carte statique sert
       de repli mobile + reduced-motion + no-JS ── */
  .hero-video {
    display: none; width: 100%; aspect-ratio: 1200 / 500; object-fit: cover;
    border-radius: 22px; box-shadow: var(--shadow-xl); background: var(--night-1);
  }
  @media (min-width: 761px) and (prefers-reduced-motion: no-preference) {
    .hero-video { display: block; }
    .hero-video + .hero-bien { display: none; }
  }
  /* Ticker 24/24 : remplace la vidéo quand elle est masquée (mobile, reduced-motion, no-JS) */
  .ticker24 { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .t24-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--raised); border: 1px solid var(--line); border-radius: 12px;
    padding: 10px 14px; font-size: 13.5px; color: var(--ink); line-height: 1.4;
    box-shadow: var(--shadow-sm);
  }
  .t24-row .t24-time { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--iris); flex: none; }
  .t24-row .face { border-radius: 50%; flex: none; }
  @media (min-width: 761px) and (prefers-reduced-motion: no-preference) {
    .ticker24 { display: none; }
  }

  /* ── Carrousel équipe façon Limova (onglets têtes + slides scroll-snap) ── */
  .crsl-tabs {
    display: flex; gap: 8px; justify-content: flex-start; overflow-x: auto;
    padding: 30px 2px 20px; scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .crsl-tabs::-webkit-scrollbar { display: none; }
  @media (min-width: 900px) { .crsl-tabs { justify-content: center; } }
  .crsl-tab {
    display: inline-flex; align-items: center; gap: 9px; flex: none;
    padding: 7px 16px 7px 8px; min-height: 48px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--raised); color: var(--muted);
    font: inherit; font-size: 14px; font-weight: 500; cursor: pointer;
    transition: border-color .2s, color .2s, box-shadow .2s;
  }
  .crsl-tab .face { border-radius: 50%; }
  .crsl-tab:hover { color: var(--ink); }
  .crsl-tab.on {
    border-color: color-mix(in srgb, var(--iris) 55%, var(--line));
    color: var(--ink); box-shadow: var(--shadow-sm);
  }
  .crsl-zone { position: relative; }
  .crsl {
    display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
    scrollbar-width: none; -webkit-overflow-scrolling: touch; border-radius: 22px;
  }
  .crsl::-webkit-scrollbar { display: none; }
  .crsl-item { flex: 0 0 100%; min-width: 0; scroll-snap-align: center; padding: 3px; }
  .crsl .tblock {
    margin-top: 0; background: var(--raised); border: 1px solid var(--line);
    border-radius: 20px; padding: clamp(22px, 3.4vw, 38px); box-shadow: var(--shadow-md);
    column-gap: clamp(26px, 4vw, 52px); height: 100%; box-sizing: border-box;
  }
  .crsl .tc-panel { box-shadow: var(--shadow-sm); border-color: var(--line-strong); }
  .crsl-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; align-items: center; }
  .crsl-arrow {
    position: absolute; top: 50%; transform: translateY(-50%); z-index: 3;
    width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--line);
    background: var(--raised); color: var(--ink); cursor: pointer; font-size: 19px;
    box-shadow: var(--shadow-md); display: flex; align-items: center; justify-content: center;
    transition: opacity .2s, box-shadow .2s;
  }
  .crsl-arrow:hover:not([disabled]) { box-shadow: var(--shadow-lg); }
  .crsl-arrow.prev { left: -16px; } .crsl-arrow.next { right: -16px; }
  .crsl-arrow[disabled] { opacity: .3; cursor: default; }
  @media (max-width: 900px) {
    .crsl-arrow { display: none; }
    .crsl .tblock { height: auto; }
  }

  /* ── Pages agents (/agents/) ── */
  .ag-hero { padding-top: clamp(28px, 5vw, 52px); }
  .ag-back { margin: 0 0 22px; font-size: 14px; }
  .ag-back a { color: var(--muted); text-decoration: none; }
  .ag-back a:hover { color: var(--ink); }
  .ag-head { display: flex; align-items: center; gap: 22px; }
  .ag-head .tb-ava img { width: 112px; height: 112px; }
  .ag-name { font-family: var(--font-display); font-size: clamp(34px, 5vw, 52px); font-weight: 480; letter-spacing: -0.02em; margin: 0; line-height: 1.05; }
  .ag-role { margin: 8px 0 0; color: var(--muted); font-size: 16px; }
  .ag-grid.tblock {
    grid-template-columns: minmax(0, 1fr) minmax(0, 460px);
    grid-template-areas: "head chat"; margin-top: clamp(26px, 4vw, 40px);
    align-items: center;
