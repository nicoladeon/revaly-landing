<!doctype html><html><head><meta charset="utf-8"><style>
  @font-face { font-family: Fraunces; src: url('assets/fonts/fraunces-var.woff2') format('woff2'); font-weight: 300 700; }
  @font-face { font-family: Geist; src: url('assets/fonts/geist-var.woff2') format('woff2'); font-weight: 100 900; }
  * { margin:0; box-sizing:border-box; }
  .og { width:1200px; height:630px; position:relative; overflow:hidden;
    background: radial-gradient(90% 70% at 18% 0%, #EEF0FE 0%, #F4F5F8 55%, #E9EBF2 100%);
    font-family: Geist, -apple-system, BlinkMacSystemFont, sans-serif; color:#171A21; }
  .villa { position:absolute; right:-140px; top:52px; width:640px; height:560px; border-radius:26px;
    overflow:hidden; box-shadow: 0 18px 60px rgba(9,11,15,.28); transform: rotate(3deg); }
  .villa img { width:100%; height:100%; object-fit:cover; }
  .villa .scrim { position:absolute; inset:0; background: linear-gradient(to top, rgba(10,18,28,.85) 0%, rgba(13,24,38,.25) 55%, rgba(18,34,54,.15) 100%); }
  .villa .t { position:absolute; left:26px; bottom:24px; color:#fff; }
  .villa .t .n { font-family:Fraunces, Georgia, serif; font-size:27px; }
  .villa .t .p { font-size:17px; opacity:.85; margin-top:4px; }
  .in { position:relative; z-index:2; padding:56px 0 0 64px; width:640px; }
  .logo { font-family:Fraunces, Georgia, serif; font-size:38px; letter-spacing:-0.02em; }
  .logo b { color:#4F46E5; }
  h1 { font-family:Fraunces, Georgia, serif; font-weight:450; font-size:53px;
    line-height:1.12; letter-spacing:-0.02em; margin-top:40px; }
  h1 .iris { color:#4F46E5; }
  .sub { margin-top:20px; font-size:23px; line-height:1.5; color:#5A6072; max-width:520px; }
  .team { display:flex; align-items:center; margin-top:32px; gap:16px; }
  .faces { display:flex; }
  .faces img { width:64px; height:64px; border-radius:50%; box-shadow:0 0 0 4px #F4F5F8; }
  .faces img + img { margin-left:-14px; }
  .pill { display:inline-flex; align-items:center; gap:9px; background:#fff; border:1px solid rgba(23,26,33,.12);
    border-radius:999px; padding:11px 20px; font-size:18px; font-weight:600; color:#171A21;
    box-shadow: 0 2px 10px rgba(23,26,33,.07); }
  .dot { width:10px; height:10px; border-radius:50%; background:#12B76A; }
</style></head><body>
<div class="og">
  <div class="villa"><img src="assets/villa_hero.jpg"><span class="scrim"></span>
    <div class="t"><div class="n">Villa des Cèdres</div><div class="p">875 000 € · mandat exclusif</div></div>
  </div>
  <div class="in">
    <div class="logo">revaly<b>.</b></div>
    <h1>Agent immobilier,<br>recrute ton équipe.<br><span class="iris">Regagne 10 h par semaine.</span></h1>
    <div class="sub">Six agents IA formés au métier d'agent immobilier — ils travaillent dans Modelo, Gmail et WhatsApp, même la nuit.</div>
    <div class="team">
      <span class="faces">
        <img src="assets/portraits/max@128.webp"><img src="assets/portraits/emma@128.webp"><img src="assets/portraits/christine@128.webp"><img src="assets/portraits/zoe@128.webp"><img src="assets/portraits/raphael@128.webp"><img src="assets/portraits/lucas@128.webp" style="filter:grayscale(1);opacity:.75;">
      </span>
      <span class="pill"><span class="dot"></span>5 en ligne aujourd'hui · 1 en formation</span>
    </div>
  </div>
</div>
</body></html>
